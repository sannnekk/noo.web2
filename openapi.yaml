    get:
      tags:
        - UserSettings
      summary: |-
        Get the current user settings.
        This includes theme, font size, and other user preferences.
      description: |-
        This endpoint always returns settings and never null or NotFound.
        If the user has not set any settings, default values will be returned.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettingsDTOApiResponseDTO"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
    patch:
      tags:
        - UserSettings
      summary: Update the current user settings.
      description: >-
        This update endpoint, unlike others, uses a full DTO instead of a patch
        document.

        This is because user settings are typically small and it's easier to
        manage them as a whole. And they are always loaded as a whole

        so partial updates are less relevant.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsUpdateDTO"
          text/json:
