openapi: 3.0.4
info:
  title: API v1
  description: Noo.Api module
  version: v1
paths:
  /assigned-work:
    get:
      tags:
        - AssignedWork
      summary: Gets the current user's list of assigned works.
      parameters:
        - name: Search
          in: query
          schema:
            type: string
        - name: Type
          in: query
          schema:
            $ref: "#/components/schemas/WorkType"
        - name: SolveStatus
          in: query
          schema:
            $ref: "#/components/schemas/AssignedWorkSolveStatus"
        - name: CheckStatus
          in: query
          schema:
            $ref: "#/components/schemas/AssignedWorkCheckStatus"
        - name: MentorId
          in: query
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          schema:
            $ref: "#/components/schemas/Ulid"
        - name: StudentId
          in: query
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          schema:
            $ref: "#/components/schemas/Ulid"
        - name: Page
          in: query
          schema:
            type: integer
            format: int32
        - name: PerPage
          in: query
          schema:
            type: integer
            format: int32
        - name: SortBy
          in: query
          schema:
            $ref: "#/components/schemas/Sorting"
        - name: Sort
          in: query
          schema:
            enum:
              - Title
              - CreatedAt
              - SolvedAt
              - CheckedAt
            type: string
        - name: CombineWith
          in: query
          schema:
            $ref: "#/components/schemas/CombineType"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignedWorkDTOIEnumerableApiResponseDTO"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{userId}/metadata:
    get:
      tags:
        - AssignedWork
      summary: Get metadata of assigned works
      parameters:
        - name: userId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignedWorksMetadataDTOApiResponseDTO"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{workAssignmentId}:
    post:
      tags:
        - AssignedWork
      summary: |-
        Creates an assigned work instance by a work assignment ID.
        This is used when a student starts working on a work
      parameters:
        - name: workAssignmentId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponseDTOApiResponseDTO"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/history:
    get:
      tags:
        - AssignedWork
      summary: Gets the assigned work history entries, paginated
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
        - name: AssignedWorkId
          in: query
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          schema:
            $ref: "#/components/schemas/Ulid"
        - name: Page
          in: query
          schema:
            type: integer
            format: int32
        - name: PerPage
          in: query
          schema:
            type: integer
            format: int32
        - name: SortBy
          in: query
          schema:
            $ref: "#/components/schemas/Sorting"
        - name: Sort
          in: query
          schema:
            enum:
              - AssignedWorkId
            type: string
        - name: CombineWith
          in: query
          schema:
            $ref: "#/components/schemas/CombineType"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignedWorkHistoryDTOIEnumerableApiResponseDTO"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}:
    get:
      tags:
        - AssignedWork
      summary: Gets an assigned work by its ID.
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignedWorkDTOApiResponseDTO"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
    delete:
      tags:
        - AssignedWork
      summary: Deletes an assigned work.
      description: |-
        Only possible if the status of the assigned work is not Solved.
        Otherwise, it will return a 409 Conflict status code.
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "204":
          description: No Content
          content:
            application/json: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{workAssignmentId}/progress:
    get:
      tags:
        - AssignedWork
      summary: |-
        Gets the progress of an assigned work by its ID.
        Used when loading the whole assigned work is not needed.
      description: >-
        It returns an array of progress because there can be multiple
        AssignedWork's as separate attempts

        for one WorkAssignment.
      parameters:
        - name: workAssignmentId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignedWorkProgressDTOIEnumerableApiResponseDTO"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/remake:
    post:
      tags:
        - AssignedWork
      summary: |-
        Remakes an assigned work.
        Returns the ID of the newly created assigned work.
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemakeAssignedWorkOptionsDTO"
          text/json:
            schema:
              $ref: "#/components/schemas/RemakeAssignedWorkOptionsDTO"
          application/*+json:
            schema:
              $ref: "#/components/schemas/RemakeAssignedWorkOptionsDTO"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponseDTOApiResponseDTO"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/save-answer:
    post:
      tags:
        - AssignedWork
      summary: |-
        Saves an Answer to an assigned work.
        This is used by students to submit their answers to assigned works,
        or by mentors to save their comments on the assigned work.
        If the answer already exists, it will be updated.
        If the answer does not exist, it will be created.
      description: It will also update the status of the assigned work to "In
        Progress" if it was not already.
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertAssignedWorkAnswerDTO"
          text/json:
            schema:
              $ref: "#/components/schemas/UpsertAssignedWorkAnswerDTO"
          application/*+json:
            schema:
              $ref: "#/components/schemas/UpsertAssignedWorkAnswerDTO"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponseDTOApiResponseDTO"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/comment:
    post:
      tags:
        - AssignedWork
      summary: >-
        Saves a comment to an assigned work.

        This is used by both students and mentors to comment on an assigned
        work.

        If the comment already exists, it will be updated.

        If the comment does not exist, it will be created.
      description: It will also update the status of the assigned work to "In
        Progress" if it was not already.
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertAssignedWorkCommentDTO"
          text/json:
            schema:
              $ref: "#/components/schemas/UpsertAssignedWorkCommentDTO"
          application/*+json:
            schema:
              $ref: "#/components/schemas/UpsertAssignedWorkCommentDTO"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdResponseDTOApiResponseDTO"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/mark-solved:
    post:
      tags:
        - AssignedWork
      summary: Marks an assigned work as solved.
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "204":
          description: No Content
          content:
            application/json: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/mark-checked:
    post:
      tags:
        - AssignedWork
      summary: Marks an assigned work as checked
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "204":
          description: No Content
          content:
            application/json: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/archive:
    patch:
      tags:
        - AssignedWork
      summary: Archives an assigned work.
      description: >-
        There is an archived flag in the assigned work for the following roles:
        student, mentor, and assistant.

        Toggling the archived flag for mentors will not affect the archived flag
        for students and assistants and so on.
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "204":
          description: No Content
          content:
            application/json: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/unarchive:
    patch:
      tags:
        - AssignedWork
      summary: unarchives an assigned work.
      description: >-
        There is an archived flag in the assigned work for the following roles:
        student, mentor, and assistant.

        Toggling the archived flag for mentors will not affect the archived flag
        for students and assistants and so on.
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "204":
          description: No Content
          content:
            application/json: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/add-helper-mentor:
    patch:
      tags:
        - AssignedWork
      summary: Adds a helper mentor to the assigned work so that they both can check
        the assigned work.
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddHelperMentorOptionsDTO"
          text/json:
            schema:
              $ref: "#/components/schemas/AddHelperMentorOptionsDTO"
          application/*+json:
            schema:
              $ref: "#/components/schemas/AddHelperMentorOptionsDTO"
      responses:
        "204":
          description: No Content
          content:
            application/json: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/replace-main-mentor:
    patch:
      tags:
        - AssignedWork
      summary: Replace main mentor of the assigned work
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceMainMentorOptionsDTO"
          text/json:
            schema:
              $ref: "#/components/schemas/ReplaceMainMentorOptionsDTO"
          application/*+json:
            schema:
              $ref: "#/components/schemas/ReplaceMainMentorOptionsDTO"
      responses:
        "204":
          description: No Content
          content:
            application/json: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/shift-deadline:
    patch:
      tags:
        - AssignedWork
      summary: Shift deadline of the assigned work
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShiftAssignedWorkDeadlineOptionsDTO"
          text/json:
            schema:
              $ref: "#/components/schemas/ShiftAssignedWorkDeadlineOptionsDTO"
          application/*+json:
            schema:
              $ref: "#/components/schemas/ShiftAssignedWorkDeadlineOptionsDTO"
      responses:
        "204":
          description: No Content
          content:
            application/json: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/return-to-solve:
    patch:
      tags:
        - AssignedWork
      summary: >-
        Changes the solve status of the assigned work back to in progress.

        This is usually used when the assigned work was marked as solved by
        mistake.
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "204":
          description: No Content
          content:
            application/json: {}
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SerializedNooException"
  /assigned-work/{assignedWorkId}/return-to-check:
    patch:
      tags:
        - AssignedWork
      summary: >-
        Changes the check status of the assigned work back to in progress.

        This is usually used when the assigned work was marked as checked by
        mistake.
      parameters:
        - name: assignedWorkId
          in: path
          description: Universally Unique Lexicographically Sortable Identifier (ULID).
          required: true
          schema:
            $ref: "#/components/schemas/Ulid"
      responses:
        "204":
          description: No Content
          content:
            application/json: {}
        "400":
          description: Bad Request
          content:
